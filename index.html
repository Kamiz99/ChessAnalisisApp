<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Chess Analysis - Análisis Profundo de Partidas</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">♞</span>
      <h1>Chess Analysis</h1>
    </div>
    <div class="topbar-actions">
      <button id="themeToggle" class="icon-btn" title="Cambiar tema">🌙</button>
      <button id="menuToggle" class="icon-btn mobile-only" title="Menú">☰</button>
    </div>
  </header>

  <main class="layout">
    <aside class="panel panel-left" id="panelLeft">
      <section class="card">
        <h2>Cargar partida</h2>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" accept=".pgn,text/plain" hidden />
          <button class="btn btn-primary" id="uploadBtn">📂 Subir archivo PGN</button>
          <p class="hint">o arrastra el archivo aquí</p>
        </div>
        <details class="paste-block">
          <summary>Pegar PGN manualmente</summary>
          <textarea id="pgnTextarea" placeholder="[Event &quot;...&quot;]&#10;1. e4 e5 2. Nf3 Nc6 ..."></textarea>
          <button class="btn btn-secondary" id="loadPgnBtn">Cargar PGN</button>
        </details>
        <div class="examples">
          <button class="link-btn" id="loadSampleBtn">⚡ Cargar partida de ejemplo</button>
        </div>
      </section>

      <section class="card" id="gameInfoCard" hidden>
        <h2>Información</h2>
        <dl class="game-meta" id="gameMeta"></dl>
      </section>

      <section class="card" id="analysisCard" hidden>
        <h2>Análisis</h2>
        <div class="analysis-controls">
          <label class="control-row">
            <span>Profundidad</span>
            <input type="range" id="depthSlider" min="8" max="22" value="16" />
            <span class="value" id="depthValue">16</span>
          </label>
          <label class="control-row">
            <span>Líneas (MultiPV)</span>
            <input type="range" id="multipvSlider" min="1" max="5" value="3" />
            <span class="value" id="multipvValue">3</span>
          </label>
          <div class="analysis-buttons">
            <button class="btn btn-primary" id="analyzeBtn">🔬 Analizar partida completa</button>
            <button class="btn btn-secondary" id="stopAnalysisBtn" disabled>⏹ Detener</button>
          </div>
          <div class="progress" id="progressBar" hidden>
            <div class="progress-fill" id="progressFill"></div>
            <span class="progress-text" id="progressText">0%</span>
          </div>
        </div>
      </section>
    </aside>

    <section class="panel panel-center">
      <div class="board-container">
        <div class="eval-bar-wrapper">
          <div class="eval-bar" id="evalBar">
            <div class="eval-bar-white" id="evalBarWhite" style="height: 50%;"></div>
            <span class="eval-bar-text" id="evalBarText">0.0</span>
          </div>
        </div>
        <div class="board-wrapper">
          <div id="board" class="chessboard" role="grid" aria-label="Tablero de ajedrez"></div>
          <div class="board-status" id="boardStatus"></div>
        </div>
      </div>
      <div class="board-controls">
        <button class="btn btn-icon" id="firstMoveBtn" title="Inicio">⏮</button>
        <button class="btn btn-icon" id="prevMoveBtn" title="Anterior">◀</button>
        <button class="btn btn-icon" id="playBtn" title="Reproducir">▶</button>
        <button class="btn btn-icon" id="nextMoveBtn" title="Siguiente">▶</button>
        <button class="btn btn-icon" id="lastMoveBtn" title="Final">⏭</button>
        <button class="btn btn-icon" id="flipBtn" title="Voltear tablero">⇅</button>
      </div>
    </section>

    <aside class="panel panel-right" id="panelRight">
      <section class="card">
        <h2>Movimientos</h2>
        <div class="moves-list" id="movesList">
          <p class="empty-state">Carga una partida para ver los movimientos.</p>
        </div>
      </section>

      <section class="card" id="engineCard" hidden>
        <h2>Motor</h2>
        <div class="engine-status" id="engineStatus">
          <span class="status-dot" id="engineStatusDot"></span>
          <span id="engineStatusText">Iniciando Stockfish...</span>
        </div>
        <div class="engine-lines" id="engineLines"></div>
      </section>

      <section class="card" id="summaryCard" hidden>
        <h2>Resumen de errores</h2>
        <div class="summary-grid" id="summaryGrid"></div>
        <div class="eval-chart-wrapper">
          <canvas id="evalChart"></canvas>
        </div>
      </section>
    </aside>
  </main>

  <div class="toast" id="toast" hidden></div>

  <script src="https://unpkg.com/chess.js@0.13.4/chess.js"></script>
  <script src="app.js"></script>
</body>
</html>
